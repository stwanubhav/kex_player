<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <title>KEX PLAYER | Next-Gen Video Experience</title>
    <!-- Font Awesome (icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <!-- Separate CSS -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- ========== HEADER ========== -->
    <header id="mainHeader">
        <div class="logo">
            <div class="logo-icon"><i class="fas fa-bolt"></i></div>
            <div class="logo-text">KEX PLAYER</div>
        </div>
        <nav class="nav-links">
            <a href="#" class="nav-link">Explore</a>
            <a href="#" class="nav-link">Series</a>
            <a href="#" class="nav-link">Originals</a>
            <a href="#" class="nav-link">Kex+</a>
        </nav>
        <div class="header-actions">
            <button class="action-btn">Sign In</button>
            <button class="action-btn primary">Subscribe</button>
        </div>
    </header>

    <!-- ========== MAIN PLAYER ========== -->
    <main>
        <div class="player-wrapper">
            <div class="player-container" id="playerContainer">
                <div class="video-container">
                    <video class="video-player" id="videoPlayer" preload="metadata" playsinline webkit-playsinline></video>
                    <div class="spinner" id="spinner"></div>
                    <div class="title-bar">
                        <div class="video-title" id="videoTitle">🎬 KEX Cinema · Ultra HD Experience</div>
                        <button class="close-btn" id="closeBtn"><i class="fas fa-times"></i></button>
                    </div>
                </div>

                <!-- ===== CONTROLS ===== -->
                <div class="controls" id="controls">
                    <div class="progress-area">
                        <div class="progress-container" id="progressContainer">
                            <div class="progress-bar" id="progressBar"></div>
                        </div>
                    </div>
                    <div class="control-buttons">
                        <div class="left-controls">
                            <button class="control-btn play-btn" id="playBtn"><i class="fas fa-play" id="playIcon"></i></button>
                            <div class="time-display"><span id="currentTime">00:00</span> / <span id="duration">00:00</span></div>
                        </div>
                        <div class="right-controls">
                            <!-- Speed -->
                            <div class="speed-options">
                                <button class="control-btn speed-btn" id="speedBtn"><i class="fas fa-gauge-high"></i></button>
                                <div class="speed-menu" id="speedMenu">
                                    <div class="speed-option" data-speed="0.5">0.5x</div>
                                    <div class="speed-option" data-speed="0.75">0.75x</div>
                                    <div class="speed-option active" data-speed="1">1x</div>
                                    <div class="speed-option" data-speed="1.25">1.25x</div>
                                    <div class="speed-option" data-speed="1.5">1.5x</div>
                                    <div class="speed-option" data-speed="2">2x</div>
                                </div>
                            </div>
                            <!-- Quality -->
                            <div class="quality-options">
                                <button class="control-btn quality-btn" id="qualityBtn"><i class="fas fa-sliders-h"></i></button>
                                <div class="quality-menu" id="qualityMenu">
                                    <div class="quality-option active" data-quality="auto">Auto HD</div>
                                    <div class="quality-option" data-quality="720p">720p</div>
                                    <div class="quality-option" data-quality="480p">480p</div>
                                </div>
                            </div>
                            <!-- Volume -->
                            <div class="volume-container">
                                <button class="control-btn volume-btn" id="volumeBtn"><i class="fas fa-volume-up" id="volumeIcon"></i></button>
                                <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.01" value="0.8" />
                            </div>
                            <!-- Fullscreen -->
                            <button class="control-btn fullscreen-btn" id="fullscreenBtn"><i class="fas fa-expand"></i></button>
                        </div>
                    </div>
                </div>
                <!-- end controls -->
            </div>
        </div>
    </main>

    <!-- ========== FOOTER ========== -->
    <footer>
        <div class="footer-content">
            <div class="footer-logo">KEX PLAYER</div>
            <div class="footer-links">
                <a href="#" class="footer-link">About Kex</a>
                <a href="#" class="footer-link">Devices</a>
                <a href="#" class="footer-link">Privacy</a>
                <a href="#" class="footer-link">Terms</a>
                <a href="#" class="footer-link">Support</a>
            </div>
            <div class="copyright">&copy; 2025 KEX Player — Cinematic immersion, everywhere.</div>
        </div>
    </footer>

    <!-- Separate JavaScript -->
    <script src="script.js"></script>
</body>
</html>
